{{ define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
</header>

<div class="post-content">
  {{ .Content }}

  <div id="gallery-grid" class="gallery-grid"></div>
  <div id="scroll-sentinel" style="height: 20px;"></div>
</div>

<div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
  <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1)" aria-label="Previous image">&#8249;</button>
  <img id="lightbox-img" src="" alt="" />
  <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1)" aria-label="Next image">&#8250;</button>
  <div id="lightbox-caption" class="lightbox-caption"></div>
  <div id="lightbox-counter" class="lightbox-counter"></div>
</div>

<style>
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 2rem;
  }

  .gallery-item {
    aspect-ratio: 1 / 1;
    overflow: hidden;
    cursor: pointer;
    border-radius: 6px;
    /* Shimmer skeleton instead of black block */
    background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    position: relative;
  }

  @media (prefers-color-scheme: dark) {
    .gallery-item {
      background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
      background-size: 200% 100%;
    }
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    /* No opacity:0 start — avoids the black flash */
    opacity: 1;
    transition: transform 0.3s ease, opacity 0.4s ease;
  }

  /* Hide img until loaded so shimmer shows through */
  .gallery-item img.loading {
    opacity: 0;
    position: absolute;
    inset: 0;
  }

  .gallery-item:hover img {
    transform: scale(1.05);
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background-color: rgba(0, 0, 0, 0.92);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 20px;
  }

  .lightbox.is-open {
    display: flex;
  }

  .lightbox img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 6px;
    cursor: default;
    user-select: none;
  }

  .lightbox-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    color: #fff;
    font-size: 2.4rem;
    line-height: 1;
    cursor: pointer;
    opacity: 0.75;
    transition: opacity 0.2s;
    padding: 4px 10px;
  }

  .lightbox-close:hover { opacity: 1; }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 2.5rem;
    line-height: 1;
    cursor: pointer;
    padding: 12px 18px;
    border-radius: 4px;
    opacity: 0.7;
    transition: opacity 0.2s, background 0.2s;
  }

  .lightbox-nav:hover {
    opacity: 1;
    background: rgba(255,255,255,0.2);
  }

  .lightbox-prev { left: 16px; }
  .lightbox-next { right: 16px; }

  .lightbox-caption {
    color: #fff;
    margin-top: 14px;
    font-size: 1rem;
    text-align: center;
    max-width: 800px;
    opacity: 0.85;
  }

  .lightbox-counter {
    color: rgba(255,255,255,0.5);
    font-size: 0.85rem;
    margin-top: 6px;
  }

  @media (max-width: 600px) {
    .gallery-grid {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .lightbox-nav { display: none; }
  }
</style>

<script>
  const galleryData = {{ if .Params.r2_images }}{{ .Params.r2_images | jsonify | safeJS }}{{ else }}[]{{ end }};

  let renderedCount = 0;
  const batchSize = 12;
  let currentIndex = -1;

  const grid = document.getElementById('gallery-grid');
  const sentinel = document.getElementById('scroll-sentinel');
  const lightbox = document.getElementById('lightbox');

  function renderBatch() {
    if (!galleryData || galleryData.length === 0) return;
    const end = Math.min(renderedCount + batchSize, galleryData.length);

    for (let i = renderedCount; i < end; i++) {
      const imgData = galleryData[i];
      const idx = i;

      const div = document.createElement('div');
      div.className = 'gallery-item';

      const img = document.createElement('img');
      img.alt = imgData.alt || '';
      img.loading = 'lazy';
      img.decoding = 'async';
      img.className = 'loading';

      img.onload = () => {
        img.classList.remove('loading');
        // Stop shimmer once image is in
        div.style.animation = 'none';
        div.style.background = 'none';
      };

      img.onerror = () => {
        img.classList.remove('loading');
        div.style.background = '#333';
      };

      img.src = imgData.src;

      div.onclick = () => openLightbox(idx);
      div.appendChild(img);
      grid.appendChild(div);
    }

    renderedCount = end;
    if (renderedCount >= galleryData.length) observer.disconnect();
  }

  const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) renderBatch();
  });
  observer.observe(sentinel);

  function openLightbox(index) {
    currentIndex = index;
    updateLightboxContent();
    lightbox.classList.add('is-open');
    document.documentElement.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('is-open');
    document.documentElement.style.overflow = '';
    // Delay clearing src to avoid flicker on close animation
    setTimeout(() => {
      document.getElementById('lightbox-img').src = '';
    }, 200);
  }

  function navigateLightbox(dir) {
    currentIndex = (currentIndex + dir + galleryData.length) % galleryData.length;
    updateLightboxContent();
  }

  function updateLightboxContent() {
    const item = galleryData[currentIndex];
    const img = document.getElementById('lightbox-img');
    img.src = item.src;
    img.alt = item.alt || '';
    document.getElementById('lightbox-caption').innerText = item.alt || '';
    document.getElementById('lightbox-counter').innerText =
      galleryData.length > 1 ? `${currentIndex + 1} / ${galleryData.length}` : '';
  }

  // Click backdrop to close
  lightbox.addEventListener('click', function(e) {
    if (e.target === lightbox) closeLightbox();
  });

  // Keyboard: Escape, arrows
  document.addEventListener('keydown', function(e) {
    if (!lightbox.classList.contains('is-open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') navigateLightbox(1);
    if (e.key === 'ArrowLeft')  navigateLightbox(-1);
  });

  // Mobile: swipe left/right
  let touchStartX = 0;
  lightbox.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
  lightbox.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) navigateLightbox(dx < 0 ? 1 : -1);
  }, { passive: true });

  // Prevent body scroll on mobile lightbox
  lightbox.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
</script>
{{ end }}
